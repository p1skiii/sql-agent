services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SQL_AGENT_POSTGRES_USER:-sql_agent}
      POSTGRES_PASSWORD: ${SQL_AGENT_POSTGRES_PASSWORD:-sql_agent}
      POSTGRES_DB: ${SQL_AGENT_POSTGRES_DB:-sql_agent_demo}
    ports:
      - "${SQL_AGENT_POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQL_AGENT_POSTGRES_USER:-sql_agent} -d ${SQL_AGENT_POSTGRES_DB:-sql_agent_demo}"]
      interval: 2s
      timeout: 5s
      retries: 20
